<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1918 Europe Map Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
            --accent: #3498db;
            --neutral: #95a5a6;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            background: #ecf0f1; 
            color: var(--primary);
        }

        #quiz-container { max-width: 900px; margin: auto; padding: 15px; }

        .map-wrapper {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .map-wrapper img { width: 100%; height: auto; border-radius: 4px; }

        #ui-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            min-height: 200px;
        }

        #question { font-size: 1.3rem; margin-bottom: 15px; font-weight: bold; }

        input { 
            padding: 12px; 
            font-size: 18px; 
            width: 80%; 
            max-width: 300px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

        button { 
            padding: 12px 20px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }

        .btn-submit { background: var(--accent); color: white; }
        .btn-override { background: var(--success); color: white; display: none; }
        .btn-next { background: var(--neutral); color: white; display: none; }
        
        #feedback { 
            font-weight: bold; 
            margin: 15px 0; 
            font-size: 1.1rem;
            min-height: 1.2em;
        }

        #score-board { margin-top: 10px; font-size: 1rem; color: #7f8c8d; }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1>Europe 1918 Geography</h1>
    
    <div class="map-wrapper">
        <img src="map1918.jpg" alt="Map of Europe 1918">
    </div>

    <div id="ui-box">
        <div id="question">Loading...</div>
        <input type="text" id="answerInput" placeholder="Type name..." autocomplete="off">
        
        <div class="btn-group">
            <button class="btn-submit" id="submitBtn" onclick="checkAnswer()">Submit Answer</button>
            <button class="btn-override" id="overrideBtn" onclick="overrideResult()">I was right (Override)</button>
            <button class="btn-next" id="nextBtn" onclick="nextQuestion(0)">I was wrong (Next)</button>
        </div>

        <div id="feedback"></div>
        <div id="score-board">Score: 0 / 35</div>
    </div>
</div>

<script>
    const quizData = [
        { id: 1, name: "Ireland" }, { id: 2, name: "Denmark" }, { id: 3, name: "Sweden" },
        { id: 4, name: "Estonia" }, { id: 5, name: "United Kingdom" }, { id: 6, name: "Netherlands" },
        { id: 7, name: "Finland" }, { id: 8, name: "Latvia" }, { id: 9, name: "Belgium" },
        { id: 10, name: "Luxembourg" }, { id: 11, name: "Germany" }, { id: 12, name: "Lithuania" },
        { id: 13, name: "France" }, { id: 14, name: "Switzerland" }, { id: 15, name: "Austria" },
        { id: 16, name: "East Prussia" }, { id: 17, name: "Spain" }, { id: 18, name: "Norway" },
        { id: 19, name: "Italy" }, { id: 20, name: "Czechoslovakia" }, { id: 21, name: "Poland" },
        { id: 22, name: "Hungary" }, { id: 23, name: "Romania" }, { id: 24, name: "Yugoslavia" },
        { id: 25, name: "Albania" }, { id: 26, name: "Greece" }, { id: 27, name: "Bulgaria" },
        { id: 28, name: "Turkey" }, { id: 29, name: "Soviet Union" }, { id: 30, name: "Portugal" },
        { id: 31, name: "Black Sea" }, { id: 32, name: "Mediterranean Sea" }, 
        { id: 33, name: "Atlantic Ocean" }, { id: 34, name: "North Sea" }, { id: 35, name: "Baltic Sea" }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let shuffledQuestions = [];

    const inputField = document.getElementById("answerInput");
    const feedbackField = document.getElementById("feedback");
    const submitBtn = document.getElementById("submitBtn");
    const overrideBtn = document.getElementById("overrideBtn");
    const nextBtn = document.getElementById("nextBtn");

    function startQuiz() {
        shuffledQuestions = [...quizData].sort(() => Math.random() - 0.5);
        currentQuestionIndex = 0;
        score = 0;
        updateScoreBoard();
        showQuestion();
    }

    function showQuestion() {
        // Reset UI
        submitBtn.style.display = "inline-block";
        overrideBtn.style.display = "none";
        nextBtn.style.display = "none";
        inputField.disabled = false;
        
        const q = shuffledQuestions[currentQuestionIndex];
        document.getElementById("question").innerText = "Identify Number: " + q.id;
        inputField.value = "";
        feedbackField.innerText = "";
        inputField.focus();
    }

    function checkAnswer() {
        const userAnswer = inputField.value.trim().toLowerCase();
        const correctAnswer = shuffledQuestions[currentQuestionIndex].name.toLowerCase();

        if (userAnswer === correctAnswer) {
            score++;
            updateScoreBoard();
            feedbackField.style.color = "var(--success)";
            feedbackField.innerText = "Correct!";
            hideControlsAndAdvance(1000);
        } else {
            // Show correction options
            inputField.disabled = true;
            submitBtn.style.display = "none";
            overrideBtn.style.display = "inline-block";
            nextBtn.style.display = "inline-block";
            
            feedbackField.style.color = "var(--error)";
            feedbackField.innerText = "Incorrect. It was: " + shuffledQuestions[currentQuestionIndex].name;
        }
    }

    function overrideResult() {
        score++;
        updateScoreBoard();
        feedbackField.style.color = "var(--success)";
        feedbackField.innerText = "Point added.";
        hideControlsAndAdvance(800);
    }

    function hideControlsAndAdvance(delay) {
        overrideBtn.style.display = "none";
        nextBtn.style.display = "none";
        setTimeout(() => nextQuestion(), delay);
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < shuffledQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function updateScoreBoard() {
        document.getElementById("score-board").innerText = `Score: ${score} / ${quizData.length}`;
    }

    function showResults() {
        document.getElementById("ui-box").innerHTML = `
            <h2>Quiz Complete!</h2>
            <p style="font-size: 1.5rem;">Final Score: ${score} / ${quizData.length}</p>
            <button class="btn-submit" onclick="location.reload()">Restart Quiz</button>
        `;
    }

    inputField.addEventListener("keypress", (e) => { if(e.key === "Enter") checkAnswer(); });

    startQuiz();
</script>

</body>
</html>
