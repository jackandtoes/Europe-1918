<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1918 Europe Map Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
            --accent: #3498db;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            background: #ecf0f1; 
            color: var(--primary);
        }

        #quiz-container { 
            max-width: 900px; 
            margin: auto; 
            padding: 15px; 
        }

        .map-wrapper {
            position: relative;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .map-wrapper img { 
            width: 100%; 
            height: auto; 
            display: block;
            border-radius: 4px;
        }

        #ui-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        
        #question { 
            font-size: 1.2rem; 
            margin-bottom: 15px; 
            color: var(--accent);
        }

        input { 
            padding: 12px; 
            font-size: 18px; 
            width: 80%; 
            max-width: 300px;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn-group { margin-top: 15px; }

        button { 
            padding: 12px 25px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            border: none;
            border-radius: 5px;
            transition: 0.2s;
            margin: 5px;
        }

        .btn-submit { background: var(--accent); color: white; }
        .btn-override { background: #95a5a6; color: white; display: none; }
        
        #feedback { 
            font-weight: bold; 
            margin-top: 15px; 
            min-height: 24px;
            font-size: 1.1rem;
        }

        #score-board { margin-top: 10px; font-size: 0.9rem; color: #7f8c8d; }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            input { width: 90%; }
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1>Europe 1918 Geography Quiz</h1>
    
    <div class="map-wrapper">
        <img src="europe1918.png" alt="Map of Europe 1918">
    </div>

    <div id="ui-box">
        <div id="question">Loading quiz...</div>
        <input type="text" id="answerInput" placeholder="Type name here..." autocomplete="off">
        
        <div class="btn-group">
            <button class="btn-submit" id="submitBtn" onclick="checkAnswer()">Submit Answer</button>
            <button class="btn-override" id="overrideBtn" onclick="overrideResult()">I was right (Override)</button>
        </div>

        <div id="feedback"></div>
        <div id="score-board">Score: 0 / 35</div>
    </div>
</div>

<script>
    const quizData = [
        { id: 1, name: "Ireland" }, { id: 2, name: "Denmark" }, { id: 3, name: "Sweden" },
        { id: 4, name: "Estonia" }, { id: 5, name: "United Kingdom" }, { id: 6, name: "Netherlands" },
        { id: 7, name: "Finland" }, { id: 8, name: "Latvia" }, { id: 9, name: "Belgium" },
        { id: 10, name: "Luxembourg" }, { id: 11, name: "Germany" }, { id: 12, name: "Lithuania" },
        { id: 13, name: "France" }, { id: 14, name: "Switzerland" }, { id: 15, name: "Austria" },
        { id: 16, name: "East Prussia" }, { id: 17, name: "Spain" }, { id: 18, name: "Norway" },
        { id: 19, name: "Italy" }, { id: 20, name: "Czechoslovakia" }, { id: 21, name: "Poland" },
        { id: 22, name: "Hungary" }, { id: 23, name: "Romania" }, { id: 24, name: "Yugoslavia" },
        { id: 25, name: "Albania" }, { id: 26, name: "Greece" }, { id: 27, name: "Bulgaria" },
        { id: 28, name: "Turkey" }, { id: 29, name: "Soviet Union" }, { id: 30, name: "Portugal" },
        { id: 31, name: "Black Sea" }, { id: 32, name: "Mediterranean Sea" }, 
        { id: 33, name: "Atlantic Ocean" }, { id: 34, name: "North Sea" }, { id: 35, name: "Baltic Sea" }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let shuffledQuestions = [];
    let canSubmit = true;

    const inputField = document.getElementById("answerInput");
    const feedbackField = document.getElementById("feedback");
    const overrideBtn = document.getElementById("overrideBtn");

    // Start
    function startQuiz() {
        shuffledQuestions = [...quizData].sort(() => Math.random() - 0.5);
        currentQuestionIndex = 0;
        score = 0;
        updateScoreBoard();
        showQuestion();
    }

    function showQuestion() {
        canSubmit = true;
        overrideBtn.style.display = "none";
        const q = shuffledQuestions[currentQuestionIndex];
        document.getElementById("question").innerText = "Identify Number: " + q.id;
        inputField.value = "";
        feedbackField.innerText = "";
        inputField.focus();
    }

    function checkAnswer() {
        if(!canSubmit) return;

        const userAnswer = inputField.value.trim().toLowerCase();
        const correctAnswer = shuffledQuestions[currentQuestionIndex].name.toLowerCase();

        if (userAnswer === correctAnswer) {
            handleSuccess();
        } else {
            handleFailure();
        }
    }

    function handleSuccess() {
        score++;
        canSubmit = false;
        feedbackField.style.color = "var(--success)";
        feedbackField.innerText = "Correct!";
        updateScoreBoard();
        nextQuestion();
    }

    function handleFailure() {
        canSubmit = false;
        feedbackField.style.color = "var(--error)";
        feedbackField.innerText = "Incorrect. It was: " + shuffledQuestions[currentQuestionIndex].name;
        overrideBtn.style.display = "inline-block"; // Show override option
        
        // Wait longer on failure so they can see the answer and decide to override
        setTimeout(() => {
            if (!overrideBtn.matches(':visible') && !canSubmit) {
                // This auto-advances if they didn't click override quickly
            }
        }, 3000);
    }

    function overrideResult() {
        score++; // Give the point anyway
        updateScoreBoard();
        feedbackField.style.color = "var(--success)";
        feedbackField.innerText = "Point added via override!";
        overrideBtn.style.display = "none";
        nextQuestion();
    }

    function nextQuestion() {
        setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < shuffledQuestions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }, 1500);
    }

    function updateScoreBoard() {
        document.getElementById("score-board").innerText = `Score: ${score} / ${quizData.length}`;
    }

    function showResults() {
        document.getElementById("ui-box").innerHTML = `
            <h2>Quiz Complete!</h2>
            <p style="font-size: 1.5rem;">Final Score: ${score} / ${quizData.length}</p>
            <button class="btn-submit" onclick="location.reload()">Restart Quiz</button>
        `;
    }

    // Allow "Enter" key to submit
    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            checkAnswer();
        }
    });

    startQuiz();
</script>

</body>
</html>
